<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/recipes/' + recipe().id"></ion-back-button>
    </ion-buttons>
    <ion-title>Edit Recipe</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <app-recipe-form
    #recipeForm
    [initialData]="recipe()"
    submitLabel="Save Changes"
    (saved)="submit($event)"
  ></app-recipe-form>
</ion-content>
