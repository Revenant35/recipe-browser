<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Recipes
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Recipes</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    @for (recipe of recipes(); track recipe.id) {
      <ion-item [button]="true" (click)="openRecipe(recipe.id)">
        <ion-label>
          {{ recipe.name }}
        </ion-label>
        <ion-note slot="end">{{ recipe.difficultyLevel?.name }}</ion-note>
      </ion-item>
    }
  </ion-list>
</ion-content>
