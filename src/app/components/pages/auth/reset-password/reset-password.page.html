<form (submit)="$event.preventDefault(); submit()" novalidate class="actions">
  <app-reset-password-form [(form)]="form"></app-reset-password-form>

  <ion-button
    expand="block"
    type="submit"
    [disabled]="isSubmitting() || !canSubmit()"
    [attr.aria-label]="isSubmitting() ? 'Resetting password' : null"
  >
    @if (isSubmitting()) {
      <ion-spinner name="crescent"></ion-spinner>
      <span class="sr-only">Resetting password...</span>
    } @else {
      <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
      Reset Password
    }
  </ion-button>
</form>
