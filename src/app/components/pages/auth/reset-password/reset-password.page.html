<form (submit)="submit()" class="actions">
  <app-reset-password-form #resetForm [(value)]="passwordModel"></app-reset-password-form>

  <ion-button
    expand="block"
    type="submit"
    [disabled]="loading() || !resetForm.form().valid()"
  >
    @if (loading()) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
      Reset Password
    }
  </ion-button>
</form>
