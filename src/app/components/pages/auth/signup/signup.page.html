<form (submit)="submit()" class="actions">
  <app-signup-form #signupForm [(value)]="signupModel"></app-signup-form>

  <ion-button expand="block" type="submit" [disabled]="loading() || !signupForm.form().valid()">
    @if (loading()) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      <ion-icon slot="start" name="person-add-outline"></ion-icon>
      Sign Up
    }
  </ion-button>

  <a routerLink="/auth/login" class="auth-link">Already have an account? Sign in</a>
</form>
