<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/recipes"></ion-back-button>
    </ion-buttons>
    <ion-title>New Recipe</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <app-recipe-form
    #recipeForm
    submitLabel="Save Recipe"
    (saved)="submit($event)"
  ></app-recipe-form>
</ion-content>
