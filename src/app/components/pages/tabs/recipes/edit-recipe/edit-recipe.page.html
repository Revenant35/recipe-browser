<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/recipes/' + recipe().id"></ion-back-button>
    </ion-buttons>
    <ion-title>Edit Recipe</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <app-recipe-form #recipeForm [(value)]="recipeModel"></app-recipe-form>

  <ion-button
    expand="block"
    [disabled]="loading() || recipeForm.form().invalid()"
    (click)="submit()"
    class="mt-6"
  >
    @if (loading()) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      <ion-icon slot="start" name="save-outline"></ion-icon>
      Save Changes
    }
  </ion-button>
</ion-content>
