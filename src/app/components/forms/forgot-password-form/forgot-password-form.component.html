<ion-input
  type="email"
  label="Email"
  autocomplete="email"
  labelPlacement="floating"
  fill="outline"
  [formField]="form().email"
  [attr.aria-describedby]="form().email().touched() && form().email().invalid() ? 'forgot-email-error' : null"
></ion-input>
@if (form().email().touched() && form().email().invalid()) {
  <p id="forgot-email-error" role="alert" class="text-red-500 text-sm px-4">
    {{ form().email().errors()[0].message }}
  </p>
}
