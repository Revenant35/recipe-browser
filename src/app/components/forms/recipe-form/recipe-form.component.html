<!-- Basic Info -->
<ion-list>
  <ion-list-header>
    <ion-label>{{ formName() }}</ion-label>
  </ion-list-header>

  <ion-item>
    <ion-input
      label="Name"
      labelPlacement="floating"
      fill="outline"
      [formField]="form.name"
    ></ion-input>
  </ion-item>
  @if (form.name().touched() && form.name().invalid()) {
    <p class="text-red-500 text-sm px-4">
      {{ form.name().errors()[0].message }}
    </p>
  }

  <ion-item>
    <ion-textarea
      label="Description"
      labelPlacement="floating"
      fill="outline"
      [formField]="form.description"
      [autoGrow]="true"
    ></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-input
      label="Source"
      labelPlacement="floating"
      fill="outline"
      [formField]="form.source"
    ></ion-input>
  </ion-item>
</ion-list>

<!-- Timing & Servings -->
<ion-list>
  <ion-list-header>
    <ion-label>Timing & Servings</ion-label>
  </ion-list-header>

  <ion-item>
    <ion-input
      label="Servings"
      labelPlacement="floating"
      fill="outline"
      type="number"
      [formField]="form.servings"
    ></ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Prep Time (minutes)"
      labelPlacement="floating"
      fill="outline"
      type="number"
      [formField]="form.prep_time_minutes"
    ></ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Cook Time (minutes)"
      labelPlacement="floating"
      fill="outline"
      type="number"
      [formField]="form.cook_time_minutes"
    ></ion-input>
  </ion-item>

  <ion-item>
    <ion-select
      label="Difficulty"
      labelPlacement="floating"
      fill="outline"
      [formField]="form.difficulty"
    >
      <ion-select-option value="Easy">Easy</ion-select-option>
      <ion-select-option value="Medium">Medium</ion-select-option>
      <ion-select-option value="Hard">Hard</ion-select-option>
    </ion-select>
  </ion-item>
</ion-list>

<!-- Ingredients -->
<ion-list>
  <ion-list-header>
    <ion-label>Ingredients</ion-label>
    <ion-button fill="clear" (click)="addIngredient()">
      <ion-icon slot="icon-only" name="add-outline"></ion-icon>
    </ion-button>
  </ion-list-header>

  <ion-reorder-group [disabled]="false" (ionItemReorder)="reorderIngredients($any($event))">
    @for (item of form.ingredients; track $index) {
      <ion-item>
        <ion-reorder slot="start"></ion-reorder>
        <ion-input
          [placeholder]="'Ingredient ' + ($index + 1)"
          [formField]="item"
        ></ion-input>
        <ion-button slot="end" fill="clear" color="danger" (click)="removeIngredient($index)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-reorder-group>
</ion-list>

<!-- Instructions -->
<ion-list>
  <ion-list-header>
    <ion-label>Instructions</ion-label>
    <ion-button fill="clear" (click)="addInstruction()">
      <ion-icon slot="icon-only" name="add-outline"></ion-icon>
    </ion-button>
  </ion-list-header>

  <ion-reorder-group [disabled]="false" (ionItemReorder)="reorderInstructions($any($event))">
    @for (item of form.instructions; track $index) {
      <ion-item>
        <ion-reorder slot="start"></ion-reorder>
        <ion-textarea
          [placeholder]="'Step ' + ($index + 1)"
          [formField]="item"
          [autoGrow]="true"
        ></ion-textarea>
        <ion-button slot="end" fill="clear" color="danger" (click)="removeInstruction($index)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-reorder-group>
</ion-list>

<!-- Nutrition -->
<ion-list>
  <ion-list-header>
    <ion-label>Nutrition (optional)</ion-label>
  </ion-list-header>

  <div class="grid grid-cols-2 gap-2 px-4">
    <ion-item>
      <ion-input
        label="Calories"
        labelPlacement="floating"
        fill="outline"
        type="number"
        [formField]="form.calories"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Protein (g)"
        labelPlacement="floating"
        fill="outline"
        type="number"
        [formField]="form.protein_grams"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Carbs (g)"
        labelPlacement="floating"
        fill="outline"
        type="number"
        [formField]="form.carbs_grams"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Fat (g)"
        labelPlacement="floating"
        fill="outline"
        type="number"
        [formField]="form.fat_grams"
      ></ion-input>
    </ion-item>
  </div>
</ion-list>
