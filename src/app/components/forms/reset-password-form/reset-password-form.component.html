<ion-input
  type="password"
  label="New Password"
  autocomplete="new-password"
  labelPlacement="floating"
  fill="outline"
  [formField]="form().password"
  [attr.aria-describedby]="form().password().touched() && form().password().invalid() ? 'reset-password-error' : null"
  class="mb-2"
></ion-input>
@if (form().password().touched() && form().password().invalid()) {
  <p id="reset-password-error" role="alert" class="text-red-500 text-sm px-4">
    {{ form().password().errors()[0].message }}
  </p>
}

<ion-input
  type="password"
  label="Confirm Password"
  autocomplete="new-password"
  labelPlacement="floating"
  fill="outline"
  [formField]="form().confirmPassword"

@if (form().confirmPassword().touched() && form().confirmPassword().invalid()) {
  <p id="reset-confirm-error" role="alert" class="text-red-500 text-sm px-4">
